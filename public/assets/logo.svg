<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="svlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background (Transparent) -->
  <rect width="400" height="400" fill="transparent" />

  <!-- Main Icon Wrapper -->
  <g transform="translate(200, 180)" filter="url(#dropShadow)">
    
    <!-- Outer Shield / Diamond shape -->
    <path d="M 0 -100 C 60 -100 100 -60 100 0 C 100 60 60 100 0 120 C -60 100 -100 60 -100 0 C -100 -60 -60 -100 0 -100 Z" 
          fill="url(#svlGrad)" />
          
    <!-- Inner Water Drop / Leaf -->
    <path d="M 0 -50 C 30 -10 30 30 0 50 C -30 30 -30 -10 0 -50 Z" 
          fill="#ffffff" opacity="0.9" />
          
    <!-- Sparkle / Star 1 -->
    <path d="M -30 -40 Q -20 -40 -20 -50 Q -20 -40 -10 -40 Q -20 -40 -20 -30 Q -20 -40 -30 -40 Z" fill="#ffffff" />
    
    <!-- Sparkle / Star 2 -->
    <path d="M 30 -10 Q 35 -10 35 -15 Q 35 -10 40 -10 Q 35 -10 35 -5 Q 35 -10 30 -10 Z" fill="#ffffff" />
  </g>

  <!-- Typography -->
  <text x="200" y="360" 
        font-family="'Inter', sans-serif, 'Helvetica Neue'" 
        font-size="64" 
        font-weight="800" 
        fill="url(#svlGrad)" 
        text-anchor="middle" 
        letter-spacing="4">SVL</text>
</svg>
